name: 👥 Sync cost center members

on:
  workflow_dispatch:
    inputs:
      enterprise_slug:
        description: GitHub Enterprise slug (optional; defaults to enterprise_slug in the config file)
        required: false
        type: string
      config_file:
        description: Unified v2 config file path. Overrides cost_center_members_config_file when set.
        required: false
        type: string
      cost_center_members_config_file:
        description: Config file path (defaults to the v2 merged config). A v1 split file is accepted here but deprecated.
        required: true
        default: config/copilot-finops.yml
        type: string
      mapping_name:
        description: Optional single mapping name to process
        required: false
        type: string
      dry_run:
        description: Preview only (no changes applied)
        required: true
        default: true
        type: boolean
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

jobs:
  sync:
    name: 👥 Sync members
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.COPILOT_FINOPS_TOKEN || github.token }}
      SYNC_SUMMARY_FILE: sync-summary.jsonl
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔍 Resolve config
        run: |
          scripts/resolve-cost-center-members-config.sh \
            --config-file "${{ inputs.config_file || inputs.cost_center_members_config_file || 'config/copilot-finops.yml' }}" \
            --dry-run "${{ inputs.dry_run }}"

      - name: 📦 Install schema validator
        run: pipx install check-jsonschema

      - name: ✅ Validate config
        run: |
          scripts/validate-config.sh "$COST_CENTER_MEMBERS_CONFIG_FILE" "$COST_CENTER_MEMBERS_CONFIG_TYPE"

      - name: 🔄 Sync members
        id: sync
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          ENTERPRISE_SLUG_INPUT: ${{ inputs.enterprise_slug || '' }}
          MAPPING_NAME: ${{ inputs.mapping_name || '' }}
        run: |
          DRY_RUN="true"
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            DRY_RUN="false"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_DRY_RUN" ]]; then
            DRY_RUN="$INPUT_DRY_RUN"
          fi

          ENTERPRISE_ARGS=()
          if [[ -n "$ENTERPRISE_SLUG_INPUT" ]]; then
            ENTERPRISE_ARGS+=(--enterprise-slug "$ENTERPRISE_SLUG_INPUT")
          fi

          scripts/sync-cost-center-members.sh \
            "${ENTERPRISE_ARGS[@]}" \
            --config-file "$COST_CENTER_MEMBERS_CONFIG_FILE" \
            --mapping-name "$MAPPING_NAME" \
            --dry-run "$DRY_RUN" | tee sync.log

      - name: 📝 Write job summary
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          DRY_RUN="true"
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            DRY_RUN="false"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_DRY_RUN" ]]; then
            DRY_RUN="$INPUT_DRY_RUN"
          fi

          jsonl="${SYNC_SUMMARY_FILE:-sync-summary.jsonl}"
          log=sync.log

          {
            echo "## Sync cost center members"
            echo
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "**Mode:** dry-run (preview only — no changes applied)"
            else
              echo "**Mode:** live (changes applied)"
            fi
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -s "$jsonl" ]]; then
            jq -rs -f .github/summary/sync-summary.jq "$jsonl" | tee rendered-summary.md >> "$GITHUB_STEP_SUMMARY"
          elif [[ -f "$log" ]] && grep -q 'Sync completed' "$log"; then
            echo "All mappings are already in sync — no membership changes." | tee rendered-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No membership results were captured — the sync step may have failed before running. See the log below._" | tee rendered-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo
            echo "<details><summary>Full run log</summary>"
            echo
            echo '```'
            if [[ -f "$log" ]]; then cat "$log"; else echo "(no log captured)"; fi
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
